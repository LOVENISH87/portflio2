<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: dark rounded square -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Terminal border glow -->
  <rect x="1" y="1" width="30" height="30" rx="5.5" stroke="#00ff88" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Top bar -->
  <rect x="2" y="2" width="28" height="6" rx="4" fill="#111111"/>
  <!-- Traffic dots -->
  <circle cx="6" cy="5" r="1.2" fill="#ff5f57"/>
  <circle cx="10" cy="5" r="1.2" fill="#febc2e"/>
  <circle cx="14" cy="5" r="1.2" fill="#28c840"/>
  <!-- Prompt: "> _" -->
  <text x="4" y="24" font-family="monospace" font-size="13" fill="#00ff88" font-weight="bold">&gt;_</text>
</svg>
